services:
  redis:
    image: redis:alpine
    restart: always
    container_name: shop-redis

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - ALLOWED_HOSTS=*
      - DEBUG=1
      - USER_SERVICE_URL=http://user-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - CART_SERVICE_URL=http://cart-service:8000
      - ORDER_SERVICE_URL=http://order-service:8000

    volumes:
      - ./services/api-gateway/databases:/app/databases
    depends_on:
      - redis
    restart: always

  user-service:
    build: ./services/user-service
    ports:
      - "8004:8000"
    environment:
      - REDIS_HOST=redis
      - ALLOWED_HOSTS=*
    volumes:
      - ./services/user-service/databases:/app/databases
    depends_on:
      - redis
    restart: always

  product-service:
    build: ./services/product-service
    ports:
      - "8001:8000"
    environment:
      - REDIS_HOST=redis
      - ALLOWED_HOSTS=*
    volumes:
      - ./services/product-service/databases:/app/databases
    depends_on:
      - redis
    restart: always

  cart-service:
    build: ./services/cart-service
    ports:
      - "8002:8000"
    environment:
      - REDIS_HOST=redis
      - ALLOWED_HOSTS=*
    volumes:
      - ./services/cart-service/databases:/app/databases
    depends_on:
      - redis
    restart: always

  order-service:
    build: ./services/order-service
    ports:
      - "8003:8000"
    environment:
      - REDIS_HOST=redis
      - ALLOWED_HOSTS=*
    volumes:
      - ./services/order-service/databases:/app/databases
    depends_on:
      - redis
    restart: always

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    restart: always
